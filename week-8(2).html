<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bouncing Ball</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }

        .ball {
            width: 80px;
            height: 80px;
            background-color: crimson;
            border-radius: 50%;
            animation: bounce 1s ease-in-out infinite alternate;
        }

        @keyframes bounce {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(-200px);
            }
        }
    </style>
</head>
<body>

    <div class="ball"></div>

</body>
</html>
